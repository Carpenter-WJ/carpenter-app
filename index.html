<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <meta name="apple-mobile-web-app-title" content="목수일지">
  <meta name="theme-color" content="#D35400">
  <title>목수 일지</title>
  <link rel="manifest" href="manifest.json">
  <style>
    * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    :root {
      --pri:#E67E22; --dark:#D35400;
      --bg:#F2F2F7; --card:#fff;
      --text:#1C1C1E; --text2:#3A3A3C; --muted:#8E8E93; --border:#E5E5EA;
      --green:#34C759; --red:#FF3B30; --blue:#007AFF;
    }
    body {
      font-family:-apple-system,'Apple SD Gothic Neo','Malgun Gothic',sans-serif;
      background:var(--bg); color:var(--text);
      padding-bottom:calc(60px + env(safe-area-inset-bottom));
    }

    /* 헤더 */
    .hdr {
      background:var(--dark); color:#fff;
      padding:14px 18px 12px;
      padding-top:calc(14px + env(safe-area-inset-top));
      position:sticky; top:0; z-index:100;
    }
    .hdr h1 { font-size:19px; font-weight:700; }
    .hdr .sub { font-size:12px; opacity:.8; margin-top:1px; }

    /* 탭바 */
    .tabbar {
      position:fixed; bottom:0; left:0; right:0;
      background:rgba(255,255,255,.95); backdrop-filter:blur(10px);
      border-top:1px solid var(--border); display:flex;
      padding-bottom:env(safe-area-inset-bottom); z-index:200;
    }
    .tbtn {
      flex:1; border:none; background:none;
      display:flex; flex-direction:column; align-items:center;
      padding:8px 0 6px; color:var(--muted); font-size:10px; cursor:pointer;
    }
    .tbtn .ico { font-size:23px; line-height:1; margin-bottom:2px; }
    .tbtn.on { color:var(--pri); }

    /* 페이지 */
    .page { display:none; }
    .page.on { display:block; }

    /* 달력 상단 */
    .cal-top { background:var(--pri); color:#fff; padding:12px 18px; }
    .cal-nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:10px; }
    .cal-nav button {
      background:rgba(255,255,255,.25); border:none; color:#fff;
      width:32px; height:32px; border-radius:50%; font-size:18px;
      cursor:pointer; display:flex; align-items:center; justify-content:center;
    }
    .cal-nav .mlbl { font-size:18px; font-weight:700; }
    .cal-sum { display:flex; gap:10px; }
    .cs-item { flex:1; background:rgba(255,255,255,.2); border-radius:10px; padding:8px 10px; text-align:center; }
    .cs-item .cv { font-size:15px; font-weight:700; }
    .cs-item .cl { font-size:10px; opacity:.85; margin-top:1px; }

    /* 달력 그리드 */
    .dow-row {
      display:grid; grid-template-columns:repeat(7,1fr);
      background:#f7f7f7; border-bottom:1px solid var(--border);
    }
    .dow-lbl { text-align:center; font-size:11px; font-weight:600; padding:7px 0; color:var(--muted); }
    .dow-lbl.sun { color:var(--red); }
    .dow-lbl.sat { color:var(--blue); }

    .cal-grid { display:grid; grid-template-columns:repeat(7,1fr); background:#fff; }
    .ccell {
      min-height:72px; border-right:1px solid var(--border);
      border-bottom:1px solid var(--border); padding:3px 2px;
      cursor:pointer; overflow:hidden;
    }
    .ccell:nth-child(7n) { border-right:none; }
    .ccell.other { background:#fafafa; }
    .ccell.other .dnum { color:#ccc; }
    .ccell:active { background:#fff8f4; }

    .dnum {
      font-size:12px; font-weight:600; color:var(--text2);
      display:inline-flex; width:22px; height:22px;
      align-items:center; justify-content:center; border-radius:50%;
    }
    .ccell.today .dnum { background:var(--pri); color:#fff !important; }
    .ccell.sunday:not(.other) .dnum { color:var(--red); }
    .ccell.saturday:not(.other) .dnum { color:var(--blue); }

    .cwrk { margin-top:2px; }
    .cwitem {
      background:#fff3e8; border-left:2px solid var(--pri);
      border-radius:2px; padding:1px 3px; margin-bottom:2px;
      font-size:9px; color:var(--dark); font-weight:600;
      white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    }
    .cwmore { font-size:9px; color:var(--muted); padding-left:2px; }

    /* 공통 */
    .sec { padding:14px; }
    .sec-title { font-size:12px; font-weight:700; color:var(--muted); margin-bottom:8px; letter-spacing:.3px; }
    .card { background:#fff; border-radius:14px; overflow:hidden; margin-bottom:12px; }
    .empty { text-align:center; color:var(--muted); padding:40px 20px; font-size:14px; line-height:1.7; }

    /* 기록 아이템 */
    .witem {
      display:flex; align-items:flex-start; padding:14px 16px;
      border-bottom:1px solid var(--border); gap:8px;
    }
    .witem:last-child { border-bottom:none; }
    .wi-main { flex:1; min-width:0; }
    .wi-site { font-size:16px; font-weight:700; }
    .wi-dates { font-size:12px; color:var(--muted); margin-top:3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
    .wi-wage { font-size:13px; color:var(--text2); margin-top:2px; }
    .wi-badge {
      display:inline-block; font-size:11px; font-weight:600;
      padding:2px 8px; border-radius:20px; margin-top:5px;
    }
    .badge-paid { background:#e8f8ed; color:var(--green); }
    .badge-unpaid { background:#fff0ee; color:var(--red); }
    .badge-partial { background:#fff8e8; color:#E67E22; }
    .wi-right { text-align:right; flex-shrink:0; }
    .wi-total { font-size:17px; font-weight:700; color:var(--pri); }
    .wi-del { background:none; border:none; color:var(--muted); font-size:16px; padding:4px 0 4px 6px; cursor:pointer; }

    /* 잔액 카드 */
    .bal-card {
      background:linear-gradient(135deg,#E67E22,#D35400);
      border-radius:16px; padding:20px; margin:14px 14px 0; color:#fff;
    }
    .bc-lbl { font-size:12px; opacity:.85; }
    .bc-amt { font-size:30px; font-weight:800; margin:4px 0 14px; }
    .bc-row { display:flex; gap:24px; }
    .bc-item .bi-l { font-size:11px; opacity:.8; }
    .bc-item .bi-v { font-size:15px; font-weight:700; margin-top:2px; }

    /* 입금 현장 아이템 */
    .pitem {
      padding:14px 16px; border-bottom:1px solid var(--border); cursor:pointer;
    }
    .pitem:last-child { border-bottom:none; }
    .pitem:active { background:#f9f9f9; }
    .pi-top { display:flex; justify-content:space-between; align-items:flex-start; gap:8px; }
    .pi-site { font-size:16px; font-weight:700; }
    .pi-meta { font-size:12px; color:var(--muted); margin-top:2px; }
    .pi-right { text-align:right; flex-shrink:0; }
    .pi-exp { font-size:12px; color:var(--muted); }
    .pi-rcv { font-size:17px; font-weight:700; color:var(--green); }
    .pi-diff { font-size:12px; margin-top:2px; font-weight:600; }
    .pi-diff.minus { color:var(--red); }
    .pi-diff.plus { color:var(--green); }
    .pi-bottom { display:flex; align-items:center; justify-content:space-between; margin-top:8px; }
    .pi-arrow { font-size:12px; color:var(--muted); }

    /* FAB */
    .fab {
      position:fixed; bottom:calc(68px + env(safe-area-inset-bottom)); right:20px;
      width:54px; height:54px; background:var(--pri); color:#fff;
      border:none; border-radius:50%; font-size:28px;
      box-shadow:0 4px 14px rgba(230,126,34,.45);
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; z-index:150;
    }

    /* 오버레이 */
    .ov {
      position:fixed; inset:0; background:rgba(0,0,0,.45);
      display:flex; align-items:flex-end; z-index:300;
      opacity:0; pointer-events:none; transition:opacity .22s;
    }
    .ov.show { opacity:1; pointer-events:all; }
    .sheet {
      background:#fff; border-radius:22px 22px 0 0; width:100%;
      padding:20px 20px calc(24px + env(safe-area-inset-bottom));
      transform:translateY(100%); transition:transform .25s cubic-bezier(.4,0,.2,1);
      max-height:90vh; overflow-y:auto;
    }
    .ov.show .sheet { transform:translateY(0); }
    .sh-handle { width:36px; height:4px; background:var(--border); border-radius:2px; margin:0 auto 18px; }
    .sh-title { font-size:18px; font-weight:700; margin-bottom:6px; }
    .sh-sub { font-size:13px; color:var(--muted); margin-bottom:16px; line-height:1.5; }

    /* 폼 */
    .fg { margin-bottom:14px; }
    .fg label { display:block; font-size:13px; font-weight:600; color:var(--muted); margin-bottom:6px; }
    .fg input {
      width:100%; padding:13px 14px; border:1.5px solid var(--border);
      border-radius:11px; font-size:16px; font-family:inherit;
      color:var(--text); outline:none; transition:border-color .18s;
    }
    .fg input:focus { border-color:var(--pri); }

    /* 날짜 칩 */
    .date-chips { display:flex; flex-wrap:wrap; gap:8px; margin-bottom:10px; min-height:36px; }
    .dchip {
      display:inline-flex; align-items:center; gap:6px;
      background:#fff3e8; border:1px solid var(--pri); border-radius:20px;
      padding:5px 10px 5px 12px; font-size:13px; color:var(--dark); font-weight:600;
    }
    .dchip button { background:none; border:none; color:var(--pri); font-size:16px; cursor:pointer; padding:0; line-height:1; }
    .add-date-btn {
      background:none; border:1.5px dashed var(--border);
      border-radius:20px; padding:6px 16px;
      font-size:13px; color:var(--muted); cursor:pointer;
    }

    /* 날짜 선택 캘린더 */
    .mode-seg { display:flex; background:var(--bg); border-radius:10px; padding:3px; margin-bottom:14px; }
    .mode-btn { flex:1; border:none; background:none; border-radius:8px; padding:8px 0; font-size:14px; font-weight:600; color:var(--muted); cursor:pointer; transition:all .15s; }
    .mode-btn.on { background:#fff; color:var(--pri); box-shadow:0 1px 3px rgba(0,0,0,.1); }
    .pick-nav { display:flex; align-items:center; justify-content:space-between; margin-bottom:8px; }
    .pick-nav button { background:none; border:none; font-size:22px; color:var(--pri); cursor:pointer; padding:4px 8px; }
    .pick-nav .pm { font-size:16px; font-weight:700; }
    .pick-dow { display:grid; grid-template-columns:repeat(7,1fr); margin-bottom:4px; }
    .pick-dow span { text-align:center; font-size:11px; font-weight:600; color:var(--muted); padding:4px 0; }
    .pick-dow .s { color:var(--red); }
    .pick-dow .sa { color:var(--blue); }
    .pick-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:2px; margin-bottom:12px; }
    .pd {
      aspect-ratio:1; display:flex; align-items:center; justify-content:center;
      border-radius:50%; font-size:13px; cursor:pointer; border:none; background:none;
      color:var(--text); font-weight:500; transition:background .1s;
    }
    .pd.other { color:#ddd; pointer-events:none; }
    .pd.already { background:#f0f0f0; color:var(--muted); border-radius:50%; }
    .pd.sel { background:var(--pri); color:#fff; font-weight:700; }
    .pd.rng-start { background:var(--dark); color:#fff; font-weight:700; }
    .pd.in-rng { background:#FFE0BC; color:var(--dark); border-radius:0; }
    .pd.rng-start + .pd.in-rng, .in-rng:first-of-type { border-radius:50% 0 0 50%; }
    .pd.in-rng.rng-end-mark { background:#FFE0BC; border-radius:0 50% 50% 0; }
    .pd.tod:not(.sel):not(.rng-start) { border:1.5px solid var(--pri); }
    .pd.sun:not(.sel):not(.rng-start):not(.other) { color:var(--red); }
    .pd.sat:not(.sel):not(.rng-start):not(.other) { color:var(--blue); }
    .range-hint { text-align:center; font-size:13px; color:var(--muted); padding:8px 12px; background:var(--bg); border-radius:8px; margin-bottom:10px; }

    /* 입금 내역 행 */
    .pay-row {
      display:flex; align-items:center; padding:11px 0;
      border-bottom:1px solid var(--border); gap:8px;
    }
    .pay-row:last-of-type { border-bottom:none; }
    .pr-main { flex:1; }
    .pr-date { font-size:12px; color:var(--muted); }
    .pr-amt { font-size:16px; font-weight:700; color:var(--green); }
    .pr-note { font-size:12px; color:var(--text2); margin-top:1px; }
    .pr-del { background:none; border:none; color:var(--muted); font-size:18px; cursor:pointer; padding:4px; }

    /* 완납 토글 */
    .paid-toggle {
      display:flex; align-items:center; justify-content:space-between;
      padding:16px 0; border-top:1px solid var(--border); margin-top:16px;
    }
    .pt-label { font-size:16px; font-weight:600; }
    .toggle-sw {
      width:51px; height:31px; background:var(--border);
      border-radius:15.5px; border:none; cursor:pointer;
      position:relative; transition:background .2s; flex-shrink:0;
    }
    .toggle-sw.on { background:var(--green); }
    .toggle-sw::after {
      content:''; position:absolute; top:2px; left:2px;
      width:27px; height:27px; background:#fff; border-radius:50%;
      box-shadow:0 2px 4px rgba(0,0,0,.2); transition:transform .2s;
    }
    .toggle-sw.on::after { transform:translateX(20px); }

    /* 버튼 */
    .btn-pri {
      width:100%; padding:15px; background:var(--pri); color:#fff;
      border:none; border-radius:13px; font-size:17px; font-weight:700;
      cursor:pointer; margin-top:4px;
    }
    .btn-out {
      width:100%; padding:13px; background:none; color:var(--pri);
      border:1.5px solid var(--pri); border-radius:13px;
      font-size:16px; font-weight:600; cursor:pointer; margin-top:10px;
    }

    /* 통계 */
    .stat-nav { display:flex; align-items:center; justify-content:space-between; padding:14px 18px 6px; }
    .stat-nav button { background:none; border:none; font-size:22px; color:var(--pri); cursor:pointer; padding:4px; }
    .stat-nav .sm { font-size:18px; font-weight:700; }
    .stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; padding:0 14px 14px; }
    .sbox { background:#fff; border-radius:13px; padding:14px 16px; }
    .sbox .sl { font-size:12px; color:var(--muted); }
    .sbox .sv { font-size:22px; font-weight:800; margin-top:4px; }
    .sbox.ori .sv { color:var(--pri); }
    .sbox.grn .sv { color:var(--green); }
    .sbox.red .sv { color:var(--red); }

    /* 로그인 화면 */
    #loginScreen {
      position:fixed; inset:0; background:var(--dark);
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      z-index:1000; color:#fff; padding:40px 32px;
      padding-top:calc(40px + env(safe-area-inset-top));
    }
    .login-icon { font-size:56px; margin-bottom:16px; }
    .login-title { font-size:28px; font-weight:800; margin-bottom:8px; }
    .login-sub { font-size:15px; opacity:.75; margin-bottom:52px; }
    .google-btn {
      background:#fff; color:#333; border:none; border-radius:14px;
      padding:16px 28px; font-size:16px; font-weight:600; cursor:pointer;
      display:flex; align-items:center; gap:12px;
      box-shadow:0 4px 16px rgba(0,0,0,.2); width:100%; justify-content:center;
    }
    .google-icon { width:22px; height:22px; }

    /* 헤더 유저 정보 */
    .hdr-user { display:flex; align-items:center; gap:8px; margin-top:6px; }
    .hdr-avatar {
      width:24px; height:24px; border-radius:50%; object-fit:cover;
      border:1.5px solid rgba(255,255,255,.5);
    }
    .hdr-name { font-size:12px; opacity:.85; }
    .hdr-logout {
      background:rgba(255,255,255,.2); border:none; border-radius:20px;
      color:#fff; font-size:11px; padding:3px 10px; cursor:pointer; margin-left:auto;
    }

    /* 날짜 모달 작업 행 */
    .dm-work {
      display:flex; align-items:center; padding:12px 0;
      border-bottom:1px solid var(--border);
    }
    .dm-work:last-of-type { border-bottom:none; }
    .dm-site { flex:1; font-size:15px; font-weight:600; }
    .dm-wage { font-size:15px; font-weight:700; color:var(--pri); margin-right:8px; }
    .dm-edit { background:none; border:none; color:var(--muted); font-size:15px; cursor:pointer; }
  </style>
</head>
<body>

<!-- 로그인 화면 -->
<div id="loginScreen">
  <div class="login-icon">🔨</div>
  <div class="login-title">목수 일지</div>
  <div class="login-sub">현장 작업 및 임금 관리</div>
  <button class="google-btn" onclick="signIn()">
    <svg class="google-icon" viewBox="0 0 48 48">
      <path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.2l6.7-6.7C35.7 2.5 30.2 0 24 0 14.7 0 6.7 5.4 2.7 13.3l7.8 6C12.4 13.2 17.8 9.5 24 9.5z"/>
      <path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v8.5h12.7c-.6 3-2.3 5.5-4.8 7.2l7.5 5.8c4.4-4 6.9-9.9 7.1-17z"/>
      <path fill="#FBBC05" d="M10.5 28.7A14.5 14.5 0 0 1 9.5 24c0-1.6.3-3.2.8-4.7l-7.8-6A23.9 23.9 0 0 0 0 24c0 3.9.9 7.5 2.7 10.7l7.8-6z"/>
      <path fill="#34A853" d="M24 48c6.2 0 11.4-2 15.2-5.5l-7.5-5.8c-2 1.4-4.6 2.2-7.7 2.2-6.2 0-11.5-4.2-13.4-9.8l-7.8 6C6.7 42.6 14.7 48 24 48z"/>
    </svg>
    Google로 로그인
  </button>
</div>

<div class="hdr">
  <h1 id="hTit">목수 일지</h1>
  <div class="hdr-user">
    <img id="hdrAvatar" class="hdr-avatar" src="" alt="" style="display:none">
    <span id="hdrName" class="hdr-name"></span>
    <button class="hdr-logout" onclick="doSignOut()">로그아웃</button>
  </div>
</div>

<!-- 달력 탭 -->
<div class="page on" id="page-cal">
  <div class="cal-top">
    <div class="cal-nav">
      <button onclick="moveM(-1)">‹</button>
      <span class="mlbl" id="calLbl"></span>
      <button onclick="moveM(1)">›</button>
    </div>
    <div class="cal-sum" id="calSum"></div>
  </div>
  <div style="background:#fff">
    <div class="dow-row">
      <div class="dow-lbl sun">일</div>
      <div class="dow-lbl">월</div>
      <div class="dow-lbl">화</div>
      <div class="dow-lbl">수</div>
      <div class="dow-lbl">목</div>
      <div class="dow-lbl">금</div>
      <div class="dow-lbl sat">토</div>
    </div>
    <div class="cal-grid" id="calGrid"></div>
  </div>
</div>

<!-- 기록 탭 -->
<div class="page" id="page-work">
  <div class="stat-nav">
    <button onclick="moveWork(-1)">‹</button>
    <span class="sm" id="workLbl"></span>
    <button onclick="moveWork(1)">›</button>
  </div>
  <div class="sec">
    <div class="sec-title" id="workSecTitle"></div>
    <div class="card" id="wList"></div>
  </div>
</div>

<!-- 입금 탭 -->
<div class="page" id="page-pay">
  <div id="balArea"></div>
  <div class="sec">
    <div class="sec-title">현장별 입금 현황 (탭하여 관리)</div>
    <div class="card" id="pList"></div>
  </div>
</div>

<!-- 통계 탭 -->
<div class="page" id="page-stat">
  <div class="stat-nav">
    <button onclick="moveStat(-1)">‹</button>
    <span class="sm" id="statLbl"></span>
    <button onclick="moveStat(1)">›</button>
  </div>
  <div class="stat-grid" id="statGrid"></div>
  <div class="sec">
    <div class="sec-title">이번 달 작업 내역</div>
    <div class="card" id="statWList"></div>
  </div>
</div>

<!-- FAB -->
<button class="fab" id="fab">+</button>

<!-- 탭바 -->
<nav class="tabbar">
  <button class="tbtn on" onclick="goTab('cal',this)"><span class="ico">📅</span>달력</button>
  <button class="tbtn" onclick="goTab('work',this)"><span class="ico">📋</span>기록</button>
  <button class="tbtn" onclick="goTab('pay',this)"><span class="ico">💰</span>입금</button>
  <button class="tbtn" onclick="goTab('stat',this)"><span class="ico">📊</span>통계</button>
</nav>

<!-- ① 날짜 클릭 모달 -->
<div class="ov" id="dayOv">
  <div class="sheet">
    <div class="sh-handle"></div>
    <div class="sh-title" id="dayOvTitle"></div>
    <div id="dayOvWorks"></div>
    <button class="btn-out" style="margin-top:14px" onclick="openWorkOv(null, selDate)">+ 이 날 작업 추가</button>

<script>
// ── Firebase 참조 ──
const auth = firebase.auth();
const fsdb = firebase.firestore();
fsdb.enablePersistence({synchronizeTabs:true}).catch(function(){});

let currentUser = null;
let DB = { works: [], payments: [] };
const TODAY = new Date();
let calY = TODAY.getFullYear(), calM = TODAY.getMonth();
let statY = TODAY.getFullYear(), statM = TODAY.getMonth();
let workY = TODAY.getFullYear(), workM = TODAY.getMonth();
let curTab = 'cal';
let selDate = null;
let selWorkId = null;
let editDates = [];

async function save() {
  localStorage.setItem('moksujilji2', JSON.stringify(DB)); // 로컬 캐시
  if (currentUser) {
    try {
      await fsdb.collection('users').doc(currentUser.uid).set(DB);
    } catch(e) { console.error('저장 오류:', e); }
  }
}

async function loadData() {
  try {
    const doc = await fsdb.collection('users').doc(currentUser.uid).get();
    if (doc.exists) {
      DB = doc.data();
      if (!DB.works) DB.works = [];
      if (!DB.payments) DB.payments = [];
    } else {
      // 기존 로컬 데이터 마이그레이션
      const local = localStorage.getItem('moksujilji2');
      if (local) { DB = JSON.parse(local); await save(); }
    }
  } catch(e) {
    const local = localStorage.getItem('moksujilji2');
    if (local) DB = JSON.parse(local);
  }
  renderCal();
}

function doSignOut() {
  if (confirm('로그아웃 하시겠습니까?')) auth.signOut();
}
function todayStr() { return ymd(TODAY.getFullYear(), TODAY.getMonth(), TODAY.getDate()); }
function ymd(y,m,d) { return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`; }
function parsD(s) { const [y,m,d]=s.split('-').map(Number); return {y,m:m-1,d}; }
function dowN(y,m,d) { return new Date(y,m,d).getDay(); }
function fmtW(n) { return Number(n).toLocaleString('ko-KR')+'원'; }
function fmtDate(s) {
  const {y,m,d}=parsD(s);
  const dow=['일','월','화','수','목','금','토'][dowN(y,m,d)];
  return `${String(m+1).padStart(2,'0')}.${String(d).padStart(2,'0')} (${dow})`;
}
function expAmt(w) { return w.dates.length * Number(w.wage); }
function rcvAmt(wId) { return DB.payments.filter(p=>p.workId===wId).reduce((s,p)=>s+Number(p.amount),0); }

function formatDatesShort(dates) {
  if(!dates||dates.length===0) return '';
  const s=[...dates].sort();
  if(s.length===1) return fmtDate(s[0]);
  const fp=parsD(s[0]), lp=parsD(s[s.length-1]);
  return `${String(fp.m+1).padStart(2,'0')}.${String(fp.d).padStart(2,'0')} ~ ${String(lp.m+1).padStart(2,'0')}.${String(lp.d).padStart(2,'0')}`;
}

// ── 탭 ──
function goTab(tab, btn) {
  curTab=tab;
  document.querySelectorAll('.page').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.tbtn').forEach(b=>b.classList.remove('on'));
  document.getElementById('page-'+tab).classList.add('on');
  btn.classList.add('on');
  const titles={cal:['목수 일지','작업 달력'],work:['작업 기록','현장별 일당'],pay:['입금 관리','현장별 수령 현황'],stat:['통계','월별 분석']};
  document.getElementById('hTit').textContent=titles[tab][0];
  const fab=document.getElementById('fab');
  if(tab==='cal')  { renderCal(); fab.style.display='flex'; fab.onclick=()=>openWorkOv(null,null); }
  if(tab==='work') { renderWork(); fab.style.display='flex'; fab.onclick=()=>openWorkOv(null,null); }
  if(tab==='pay')  { renderPay(); fab.style.display='none'; }
  if(tab==='stat') { renderStat(); fab.style.display='none'; }
}

// ── 달력 ──
function moveM(d) {
  calM+=d; if(calM>11){calM=0;calY++;} if(calM<0){calM=11;calY--;} renderCal();
}

function renderCal() {
  document.getElementById('calLbl').textContent=`${calY}년 ${calM+1}월`;

  const allDates=[];
  DB.works.forEach(w=>w.dates.forEach(d=>{const p=parsD(d);if(p.y===calY&&p.m===calM)allDates.push(d);}));
  const workDays=new Set(allDates).size;
  let mWage=0;
  DB.works.forEach(w=>{
    const cnt=w.dates.filter(d=>{const p=parsD(d);return p.y===calY&&p.m===calM;}).length;
    mWage+=cnt*Number(w.wage);
  });
  const mPaid=DB.payments.filter(p=>{const d=parsD(p.date);return d.y===calY&&d.m===calM;}).reduce((s,p)=>s+Number(p.amount),0);

  document.getElementById('calSum').innerHTML=`
    <div class="cs-item"><div class="cv">${workDays}일</div><div class="cl">작업일수</div></div>
    <div class="cs-item"><div class="cv">${(mWage/10000).toFixed(0)}만원</div><div class="cl">총 일당</div></div>
    <div class="cs-item"><div class="cv">${(mPaid/10000).toFixed(0)}만원</div><div class="cl">수령액</div></div>
  `;

  const dateMap={};
  DB.works.forEach(w=>w.dates.forEach(d=>{if(!dateMap[d])dateMap[d]=[];dateMap[d].push(w.site);}));

  const firstDow=new Date(calY,calM,1).getDay();
  const dim=new Date(calY,calM+1,0).getDate();
  const diPrev=new Date(calY,calM,0).getDate();
  const todStr=todayStr();
  let html='';

  for(let i=firstDow-1;i>=0;i--) html+=`<div class="ccell other"><span class="dnum">${diPrev-i}</span></div>`;

  for(let d=1;d<=dim;d++){
    const ds=ymd(calY,calM,d);
    const wd=dowN(calY,calM,d);
    let cls='ccell';
    if(ds===todStr)cls+=' today';
    if(wd===0)cls+=' sunday';
    if(wd===6)cls+=' saturday';
    const sites=dateMap[ds]||[];
    let sHtml='';
    if(sites.length>0){
      sHtml='<div class="cwrk">';
      sHtml+=sites.slice(0,2).map(s=>`<div class="cwitem">${s}</div>`).join('');
      if(sites.length>2)sHtml+=`<div class="cwmore">+${sites.length-2}</div>`;
      sHtml+='</div>';
    }
    html+=`<div class="${cls}" onclick="openDayOv('${ds}')"><span class="dnum">${d}</span>${sHtml}</div>`;
  }

  const rem=(firstDow+dim)%7===0?0:7-(firstDow+dim)%7;
  for(let d=1;d<=rem;d++) html+=`<div class="ccell other"><span class="dnum">${d}</span></div>`;
  document.getElementById('calGrid').innerHTML=html;
}

// ── 날짜 모달 ──
function openDayOv(ds) {
  selDate=ds;
  document.getElementById('dayOvTitle').textContent=fmtDate(ds);
  const works=DB.works.filter(w=>w.dates.includes(ds));
  if(works.length===0){
    document.getElementById('dayOvWorks').innerHTML='<div class="empty" style="padding:16px 0 8px">이 날 작업 기록이 없습니다</div>';
  } else {
    document.getElementById('dayOvWorks').innerHTML=works.map(w=>`
      <div class="dm-work">
        <div class="dm-site">${w.site}</div>
        <div class="dm-wage">${fmtW(w.wage)}</div>
        <button class="dm-edit" onclick="openWorkOv('${w.id}',null)">✏️</button>
      </div>
    `).join('');
  }
  openOv('dayOv');
}

// ── 작업 추가/수정 ──
function openWorkOv(workId, prefillDate) {
  closeAll();
  editDates=[];
  document.getElementById('editWorkId').value=workId||'';
  document.getElementById('workOvTitle').textContent=workId?'작업 수정':'작업 추가';
  if(workId){
    const w=DB.works.find(x=>x.id===workId);
    if(w){ document.getElementById('inSite').value=w.site; document.getElementById('inWage').value=w.wage; editDates=[...w.dates]; }
  } else {
    document.getElementById('inSite').value='';
    document.getElementById('inWage').value='';
    if(prefillDate) editDates=[prefillDate];
  }
  renderDateChips();
  openOv('workOv');
}

function renderDateChips() {
  const sorted=[...editDates].sort();
  document.getElementById('dateChips').innerHTML=sorted.map(d=>`
    <div class="dchip">${fmtDate(d)}<button onclick="removeDate('${d}')">✕</button></div>
  `).join('');
  const lbl=document.getElementById('dateLabel');
  if(lbl) lbl.textContent=editDates.length>0?`일한 날짜 (총 ${editDates.length}일)`:'일한 날짜';
}
function removeDate(d) { editDates=editDates.filter(x=>x!==d); renderDateChips(); }

// ── 커스텀 날짜 선택 ──
let pickY, pickM, pickMode='single', pickSel=[], rangeStart=null;

function openDatePickOv() {
  const now=new Date();
  pickY=now.getFullYear(); pickM=now.getMonth();
  pickSel=[]; rangeStart=null;
  setPickMode('single');
  renderPickCal();
  openOv('datePickOv');
}

function setPickMode(mode) {
  pickMode=mode; rangeStart=null;
  document.getElementById('modeBtn-single').classList.toggle('on',mode==='single');
  document.getElementById('modeBtn-range').classList.toggle('on',mode==='range');
  document.getElementById('rangeHint').style.display=mode==='range'?'block':'none';
  if(mode==='range') document.getElementById('rangeHint').textContent='시작일을 탭하세요';
  renderPickCal();
}

function movePickM(d) {
  pickM+=d; if(pickM>11){pickM=0;pickY++;} if(pickM<0){pickM=11;pickY--;} renderPickCal();
}

function renderPickCal() {
  document.getElementById('pickLbl').textContent=`${pickY}년 ${pickM+1}월`;
  const firstDow=new Date(pickY,pickM,1).getDay();
  const dim=new Date(pickY,pickM+1,0).getDate();
  const diPrev=new Date(pickY,pickM,0).getDate();
  const todStr=todayStr();
  let html='';

  for(let i=firstDow-1;i>=0;i--) html+=`<button class="pd other" disabled>${diPrev-i}</button>`;

  for(let d=1;d<=dim;d++){
    const ds=ymd(pickY,pickM,d);
    const wd=dowN(pickY,pickM,d);
    let cls='pd';
    if(ds===todStr) cls+=' tod';
    if(wd===0) cls+=' sun';
    if(wd===6) cls+=' sat';
    if(editDates.includes(ds)) cls+=' already';
    else if(ds===rangeStart) cls+=' rng-start';
    else if(pickSel.includes(ds)) cls+=' sel';
    html+=`<button class="${cls}" onclick="onPickDay('${ds}')">${d}</button>`;
  }

  const rem=(firstDow+dim)%7===0?0:7-(firstDow+dim)%7;
  for(let d=1;d<=rem;d++) html+=`<button class="pd other" disabled>${d}</button>`;
  document.getElementById('pickGrid').innerHTML=html;

  const total=pickSel.length;
  document.getElementById('pickSelCount').textContent=total>0?`${total}일 선택됨`:'';
}

function onPickDay(ds) {
  if(editDates.includes(ds)) return;

  if(pickMode==='single') {
    if(pickSel.includes(ds)) pickSel=pickSel.filter(x=>x!==ds);
    else pickSel.push(ds);
  } else {
    if(!rangeStart) {
      rangeStart=ds;
      document.getElementById('rangeHint').textContent='종료일을 탭하세요';
    } else {
      const start=rangeStart<ds?rangeStart:ds;
      const end=rangeStart<ds?ds:rangeStart;
      let cur=new Date(start+'T00:00:00');
      const endD=new Date(end+'T00:00:00');
      while(cur<=endD){
        const s=ymd(cur.getFullYear(),cur.getMonth(),cur.getDate());
        if(!editDates.includes(s)&&!pickSel.includes(s)) pickSel.push(s);
        cur.setDate(cur.getDate()+1);
      }
      rangeStart=null;
      document.getElementById('rangeHint').textContent='시작일을 탭하세요';
    }
  }
  renderPickCal();
}

function confirmDatePick() {
  pickSel.forEach(d=>{ if(!editDates.includes(d)) editDates.push(d); });
  editDates.sort(); renderDateChips();
  closeOv('datePickOv');
}

function saveWork() {
  const site=document.getElementById('inSite').value.trim();
  const wage=Number(document.getElementById('inWage').value);
  const workId=document.getElementById('editWorkId').value;
  if(!site){alert('현장명을 입력해 주세요.');return;}
  if(!wage){alert('일당을 입력해 주세요.');return;}
  if(editDates.length===0){alert('날짜를 1개 이상 추가해 주세요.');return;}
  if(workId){
    const w=DB.works.find(x=>x.id===workId);
    if(w){w.site=site;w.wage=wage;w.dates=editDates.sort();}
  } else {
    DB.works.push({id:Date.now().toString(36),site,wage,dates:editDates.sort(),isPaid:false});
  }
  DB.works.sort((a,b)=>b.dates[b.dates.length-1].localeCompare(a.dates[a.dates.length-1]));
  save(); closeAll();
  if(curTab==='cal')renderCal();
  else if(curTab==='work')renderWork();
  else if(curTab==='pay')renderPay();
}

function delWork(id) {
  if(!confirm('이 현장 기록을 삭제하시겠습니까?\n관련 입금 내역도 함께 삭제됩니다.'))return;
  DB.works=DB.works.filter(w=>w.id!==id);
  DB.payments=DB.payments.filter(p=>p.workId!==id);
  save();
  if(curTab==='cal')renderCal();
  else if(curTab==='work')renderWork();
  else if(curTab==='pay')renderPay();
}

// ── 기록 탭 ──
function moveWork(d) {
  workM+=d; if(workM>11){workM=0;workY++;} if(workM<0){workM=11;workY--;} renderWork();
}

function renderWork() {
  document.getElementById('workLbl').textContent=`${workY}년 ${workM+1}월`;
  const filtered=DB.works.filter(w=>w.dates.some(d=>{const p=parsD(d);return p.y===workY&&p.m===workM;}));
  const totalDays=new Set(filtered.flatMap(w=>w.dates.filter(d=>{const p=parsD(d);return p.y===workY&&p.m===workM;}))).size;
  const totalWage=filtered.reduce((s,w)=>{
    const cnt=w.dates.filter(d=>{const p=parsD(d);return p.y===workY&&p.m===workM;}).length;
    return s+cnt*Number(w.wage);
  },0);
  document.getElementById('workSecTitle').textContent=filtered.length>0?`${filtered.length}개 현장 · ${totalDays}일 · ${fmtW(totalWage)}`:'이번 달 작업 기록';
  const el=document.getElementById('wList');
  if(filtered.length===0){el.innerHTML='<div class="empty">이번 달 작업 기록이 없습니다.</div>';return;}
  el.innerHTML=filtered.map(w=>{
    const rcv=rcvAmt(w.id);
    const badge=w.isPaid
      ?'<span class="wi-badge badge-paid">완납</span>'
      :(rcv>0?'<span class="wi-badge badge-partial">부분입금</span>':'<span class="wi-badge badge-unpaid">미입금</span>');
    const mDates=w.dates.filter(d=>{const p=parsD(d);return p.y===workY&&p.m===workM;});
    return `
      <div class="witem">
        <div class="wi-main">
          <div class="wi-site">${w.site}</div>
          <div class="wi-dates">${formatDatesShort(mDates)} · ${mDates.length}일</div>
          <div class="wi-wage">일당 ${fmtW(w.wage)}</div>
          ${badge}
        </div>
        <div class="wi-right">
          <div class="wi-total">${fmtW(mDates.length*Number(w.wage))}</div>
        </div>
        <button class="wi-del" onclick="delWork('${w.id}')">🗑</button>
      </div>`;
  }).join('');
}

// ── 입금 탭 ──
function renderPay() {
  const totalExp=DB.works.reduce((s,w)=>s+expAmt(w),0);
  const totalRcv=DB.works.reduce((s,w)=>s+rcvAmt(w.id),0);
  document.getElementById('balArea').innerHTML=`
    <div class="bal-card">
      <div class="bc-lbl">전체 미수금</div>
      <div class="bc-amt">${fmtW(Math.max(0,totalExp-totalRcv))}</div>
      <div class="bc-row">
        <div class="bc-item"><div class="bi-l">총 예상금액</div><div class="bi-v">${fmtW(totalExp)}</div></div>
        <div class="bc-item"><div class="bi-l">수령 완료</div><div class="bi-v">${fmtW(totalRcv)}</div></div>
      </div>
    </div>`;

  const el=document.getElementById('pList');
  if(DB.works.length===0){el.innerHTML='<div class="empty">작업 기록이 없습니다.<br>기록 탭에서 먼저 추가해 주세요.</div>';return;}

  const sorted=[...DB.works].sort((a,b)=>a.isPaid===b.isPaid?0:a.isPaid?1:-1);
  el.innerHTML=sorted.map(w=>{
    const exp=expAmt(w), rcv=rcvAmt(w.id), diff=rcv-exp;
    const badge=w.isPaid
      ?'<span class="wi-badge badge-paid" style="font-size:11px">완납</span>'
      :(rcv>0?'<span class="wi-badge badge-partial" style="font-size:11px">부분입금</span>':'<span class="wi-badge badge-unpaid" style="font-size:11px">미입금</span>');
    const diffHtml=diff===0?'':`<div class="pi-diff ${diff<0?'minus':'plus'}">${diff<0?'▼':'▲'} ${fmtW(Math.abs(diff))} ${diff<0?'덜 받음':'더 받음'}</div>`;
    return `
      <div class="pitem" onclick="openPayDetail('${w.id}')">
        <div class="pi-top">
          <div>
            <div class="pi-site">${w.site}</div>
            <div class="pi-meta">${formatDatesShort(w.dates)} · ${w.dates.length}일</div>
          </div>
          <div class="pi-right">
            <div class="pi-exp">예상 ${fmtW(exp)}</div>
            <div class="pi-rcv">${fmtW(rcv)}</div>
            ${diffHtml}
          </div>
        </div>
        <div class="pi-bottom">${badge}<div class="pi-arrow">입금 관리 ›</div></div>
      </div>`;
  }).join('');
}

// ── 입금 상세 ──
function openPayDetail(wId) {
  selWorkId=wId;
  const w=DB.works.find(x=>x.id===wId);
  if(!w)return;
  const exp=expAmt(w), rcv=rcvAmt(wId), diff=rcv-exp;
  document.getElementById('pdSite').textContent=w.site;
  document.getElementById('pdInfo').innerHTML=`
    ${formatDatesShort(w.dates)} · ${w.dates.length}일 · 일당 ${fmtW(w.wage)}<br>
    예상 <b>${fmtW(exp)}</b> &nbsp;|&nbsp; 수령 <b>${fmtW(rcv)}</b>
    ${diff!==0?` &nbsp;|&nbsp; 차액 <b style="color:${diff<0?'var(--red)':'var(--green)'}">${diff<0?'▼':'▲'} ${fmtW(Math.abs(diff))}</b>`:''}
  `;
  const pays=DB.payments.filter(p=>p.workId===wId).sort((a,b)=>a.date.localeCompare(b.date));
  document.getElementById('pdPayRows').innerHTML=pays.length===0
    ?'<div class="empty" style="padding:20px 0">입금 내역이 없습니다</div>'
    :pays.map(p=>`
      <div class="pay-row">
        <div class="pr-main">
          <div class="pr-date">${fmtDate(p.date)}</div>
          <div class="pr-amt">+${fmtW(p.amount)}</div>
          ${p.note?`<div class="pr-note">${p.note}</div>`:''}
        </div>
        <button class="pr-del" onclick="delPay('${p.id}')">🗑</button>
      </div>`).join('');
  document.getElementById('paidToggle').classList.toggle('on',w.isPaid);
  openOv('payDetailOv');
}

function togglePaid() {
  const w=DB.works.find(x=>x.id===selWorkId);
  if(!w)return;
  w.isPaid=!w.isPaid; save();
  document.getElementById('paidToggle').classList.toggle('on',w.isPaid);
  renderPay();
}

function openAddPayOv() {
  document.getElementById('inPayDate').value=todayStr();
  document.getElementById('inPayAmt').value='';
  document.getElementById('inPayNote').value='';
  openOv('addPayOv');
}

function savePayment() {
  const date=document.getElementById('inPayDate').value;
  const amount=Number(document.getElementById('inPayAmt').value);
  const note=document.getElementById('inPayNote').value.trim();
  if(!date||!amount){alert('날짜와 금액을 입력해 주세요.');return;}
  DB.payments.push({id:Date.now().toString(36),workId:selWorkId,date,amount,note});
  save(); closeOv('addPayOv'); openPayDetail(selWorkId); renderPay();
}

function delPay(id) {
  if(!confirm('이 입금 내역을 삭제하시겠습니까?'))return;
  DB.payments=DB.payments.filter(p=>p.id!==id);
  save(); openPayDetail(selWorkId); renderPay();
}

// ── 통계 ──
function moveStat(d) {
  statM+=d; if(statM>11){statM=0;statY++;} if(statM<0){statM=11;statY--;} renderStat();
}

function renderStat() {
  document.getElementById('statLbl').textContent=`${statY}년 ${statM+1}월`;
  const works=DB.works.filter(w=>w.dates.some(d=>{const p=parsD(d);return p.y===statY&&p.m===statM;}));
  let mWage=0;
  works.forEach(w=>{
    const cnt=w.dates.filter(d=>{const p=parsD(d);return p.y===statY&&p.m===statM;}).length;
    mWage+=cnt*Number(w.wage);
  });
  const workDays=new Set(works.flatMap(w=>w.dates.filter(d=>{const p=parsD(d);return p.y===statY&&p.m===statM;}))).size;
  const mPaid=DB.payments.filter(p=>{const d=parsD(p.date);return d.y===statY&&d.m===statM;}).reduce((s,p)=>s+Number(p.amount),0);
  const allExp=DB.works.reduce((s,w)=>s+expAmt(w),0);
  const allRcv=DB.works.reduce((s,w)=>s+rcvAmt(w.id),0);

  document.getElementById('statGrid').innerHTML=`
    <div class="sbox"><div class="sl">작업일수</div><div class="sv">${workDays}일</div></div>
    <div class="sbox"><div class="sl">현장 수</div><div class="sv">${works.length}곳</div></div>
    <div class="sbox ori"><div class="sl">총 일당</div><div class="sv">${(mWage/10000).toFixed(1)}만</div></div>
    <div class="sbox grn"><div class="sl">이번 달 수령</div><div class="sv">${(mPaid/10000).toFixed(1)}만</div></div>
    <div class="sbox ${allExp-allRcv>0?'red':'grn'}" style="grid-column:1/-1">
      <div class="sl">전체 미수금</div><div class="sv">${fmtW(allExp-allRcv)}</div>
    </div>`;

  const wl=document.getElementById('statWList');
  if(works.length===0){wl.innerHTML='<div class="empty">이번 달 작업 기록이 없습니다.</div>';return;}
  wl.innerHTML=works.map(w=>{
    const mDates=w.dates.filter(d=>{const p=parsD(d);return p.y===statY&&p.m===statM;});
    return `
      <div class="witem">
        <div class="wi-main">
          <div class="wi-site">${w.site}</div>
          <div class="wi-dates">${mDates.map(d=>fmtDate(d)).join(', ')}</div>
          <div class="wi-wage">일당 ${fmtW(w.wage)}</div>
        </div>
        <div class="wi-total">${fmtW(mDates.length*Number(w.wage))}</div>
      </div>`;
  }).join('');
}

// ── 백업 ──
function exportData() {
  const blob=new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  a.href=url; a.download=`목수일지_백업_${todayStr()}.json`;
  document.body.appendChild(a); a.click(); document.body.removeChild(a); URL.revokeObjectURL(url);
}
function importData(e) {
  const file=e.target.files[0]; if(!file)return;
  const r=new FileReader();
  r.onload=ev=>{
    try {
      const p=JSON.parse(ev.target.result);
      if(!Array.isArray(p.works)||!Array.isArray(p.payments)){alert('올바른 백업 파일이 아닙니다.');return;}
      if(!confirm(`작업 ${p.works.length}건, 입금 ${p.payments.length}건.\n현재 데이터를 덮어쓰고 복원하시겠습니까?`))return;
      DB=p; save(); alert('복원 완료!');
      renderCal(); renderWork(); renderPay(); renderStat();
    } catch{alert('파일을 읽을 수 없습니다.');}
  };
  r.readAsText(file); e.target.value='';
}

// ── 오버레이 ──
function openOv(id){document.getElementById(id).classList.add('show');}
function closeOv(id){document.getElementById(id).classList.remove('show');}
function closeAll(){document.querySelectorAll('.ov').forEach(o=>o.classList.remove('show'));}
document.querySelectorAll('.ov').forEach(o=>{
  o.addEventListener('click',e=>{if(e.target===o)o.classList.remove('show');});
});

// ── Firebase 인증 상태 감지 ──
auth.getRedirectResult().then(function(result){
  if(result && result.user) console.log('redirect login ok:', result.user.email);
}).catch(function(e){
  console.error('redirect error', e);
});

auth.onAuthStateChanged(user => {
  const loginScreen = document.getElementById('loginScreen');
  if (user) {
    currentUser = user;
    loginScreen.style.display = 'none';
    const avatar = document.getElementById('hdrAvatar');
    if (user.photoURL) { avatar.src = user.photoURL; avatar.style.display = 'block'; }
    document.getElementById('hdrName').textContent = user.displayName || user.email;
    loadData();
  } else {
    currentUser = null;
    DB = { works: [], payments: [] };
    loginScreen.style.display = 'flex';
  }
});

document.getElementById('fab').onclick=()=>openWorkOv(null,null);
if('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(()=>{});
</script>
